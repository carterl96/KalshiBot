name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  engine:
    name: Engine (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r engine/requirements.txt
      - name: Run tests
        run: pytest -q

  web:
    name: Web (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci || npm install
      - name: Build
        run: npm run build
